version: "3.8"

services:
  mqtt:
    image: eclipse-mosquitto
    container_name: mqtt-broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mqtt/data:/mosquitto/data
      - ./mqtt/log:/mosquitto/log

  backend:
    build: ./backend
    container_name: python-backend
    depends_on:
      - mqtt
    environment:
      - MQTT_HOST=mqtt
    ports:
      - "8000:8000"
